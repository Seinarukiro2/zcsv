<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D9E75"/>
      <stop offset="100%" stop-color="#2dd4a0"/>
    </linearGradient>
    <linearGradient id="grayBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b3f46"/>
      <stop offset="100%" stop-color="#4a4f57"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="620" rx="12" fill="url(#bg)"/>

  <!-- Header -->
  <text x="40" y="44" fill="#e6edf3" font-size="22" font-weight="600">⚡ zcsv</text>
  <text x="122" y="44" fill="#7d8590" font-size="22" font-weight="300">benchmark results</text>
  <text x="40" y="68" fill="#7d8590" font-size="13">100,000 rows · Python 3.12 · Apple Silicon · vs stdlib csv</text>

  <!-- Top metric cards -->
  <!-- Card 1 -->
  <rect x="40" y="90" width="180" height="72" rx="8" fill="#1a1f27" stroke="#30363d" stroke-width="0.5"/>
  <text x="130" y="116" fill="#7d8590" font-size="11" text-anchor="middle">reader() peak</text>
  <text x="130" y="146" fill="#2dd4a0" font-size="28" font-weight="700" text-anchor="middle">4.6×</text>

  <!-- Card 2 -->
  <rect x="232" y="90" width="180" height="72" rx="8" fill="#1a1f27" stroke="#30363d" stroke-width="0.5"/>
  <text x="322" y="116" fill="#7d8590" font-size="11" text-anchor="middle">DictReader() peak</text>
  <text x="322" y="146" fill="#2dd4a0" font-size="28" font-weight="700" text-anchor="middle">6.0×</text>

  <!-- Card 3 -->
  <rect x="424" y="90" width="180" height="72" rx="8" fill="#1a1f27" stroke="#30363d" stroke-width="0.5"/>
  <text x="514" y="116" fill="#7d8590" font-size="11" text-anchor="middle">writer() peak</text>
  <text x="514" y="146" fill="#58a6ff" font-size="28" font-weight="700" text-anchor="middle">1.4×</text>

  <!-- Card 4 -->
  <rect x="616" y="90" width="180" height="72" rx="8" fill="#1a1f27" stroke="#30363d" stroke-width="0.5"/>
  <text x="706" y="116" fill="#7d8590" font-size="11" text-anchor="middle">total improvement</text>
  <text x="706" y="146" fill="#d2a8ff" font-size="28" font-weight="700" text-anchor="middle">30×</text>

  <!-- Legend -->
  <rect x="40" y="182" width="10" height="10" rx="2" fill="url(#grayBar)"/>
  <text x="56" y="191" fill="#7d8590" font-size="12">stdlib csv</text>
  <rect x="130" y="182" width="10" height="10" rx="2" fill="url(#greenBar)"/>
  <text x="146" y="191" fill="#7d8590" font-size="12">zcsv</text>
  <text x="800" y="191" fill="#484f58" font-size="11" text-anchor="end">seconds (lower is better)</text>

  <!-- Bar chart area -->
  <!-- Row 1: reader() 10 cols -->
  <text x="40" y="228" fill="#e6edf3" font-size="12" font-weight="500">reader()</text>
  <text x="40" y="242" fill="#7d8590" font-size="10">10 cols · 6.7 MB</text>

  <rect x="180" y="220" width="261" height="14" rx="3" fill="url(#grayBar)" opacity="0.7"/>
  <text x="448" y="232" fill="#7d8590" font-size="11">0.080s</text>

  <rect x="180" y="238" width="59" height="14" rx="3" fill="url(#greenBar)"/>
  <text x="246" y="250" fill="#2dd4a0" font-size="11" font-weight="600">0.018s</text>
  <rect x="495" y="225" width="44" height="24" rx="4" fill="#1D9E75" opacity="0.15"/>
  <text x="517" y="242" fill="#2dd4a0" font-size="12" font-weight="700" text-anchor="middle">4.4×</text>

  <!-- Row 2: reader() 50 cols -->
  <text x="40" y="282" fill="#e6edf3" font-size="12" font-weight="500">reader()</text>
  <text x="40" y="296" fill="#7d8590" font-size="10">50 cols · 37 MB</text>

  <rect x="180" y="274" width="326" height="14" rx="3" fill="url(#grayBar)" opacity="0.7"/>
  <text x="513" y="286" fill="#7d8590" font-size="11">0.335s</text>

  <rect x="180" y="292" width="71" height="14" rx="3" fill="url(#greenBar)"/>
  <text x="258" y="304" fill="#2dd4a0" font-size="11" font-weight="600">0.073s</text>
  <rect x="565" y="279" width="44" height="24" rx="4" fill="#1D9E75" opacity="0.15"/>
  <text x="587" y="296" fill="#2dd4a0" font-size="12" font-weight="700" text-anchor="middle">4.6×</text>

  <!-- Row 3: DictReader() 10 cols -->
  <text x="40" y="336" fill="#e6edf3" font-size="12" font-weight="500">DictReader()</text>
  <text x="40" y="350" fill="#7d8590" font-size="10">10 cols · 6.7 MB</text>

  <rect x="180" y="328" width="240" height="14" rx="3" fill="url(#grayBar)" opacity="0.7"/>
  <text x="427" y="340" fill="#7d8590" font-size="11">0.124s</text>

  <rect x="180" y="346" width="48" height="14" rx="3" fill="url(#greenBar)"/>
  <text x="235" y="358" fill="#2dd4a0" font-size="11" font-weight="600">0.025s</text>
  <rect x="475" y="333" width="44" height="24" rx="4" fill="#1D9E75" opacity="0.15"/>
  <text x="497" y="350" fill="#2dd4a0" font-size="12" font-weight="700" text-anchor="middle">5.0×</text>

  <!-- Row 4: DictReader() 50 cols -->
  <text x="40" y="390" fill="#e6edf3" font-size="12" font-weight="500">DictReader()</text>
  <text x="40" y="404" fill="#7d8590" font-size="10">50 cols · 37 MB</text>

  <rect x="180" y="382" width="400" height="14" rx="3" fill="url(#grayBar)" opacity="0.7"/>
  <text x="587" y="394" fill="#7d8590" font-size="11">0.491s</text>

  <rect x="180" y="400" width="67" height="14" rx="3" fill="url(#greenBar)"/>
  <text x="254" y="412" fill="#2dd4a0" font-size="11" font-weight="600">0.082s</text>
  <rect x="637" y="387" width="44" height="24" rx="4" fill="#1D9E75" opacity="0.15"/>
  <text x="659" y="404" fill="#2dd4a0" font-size="12" font-weight="700" text-anchor="middle">6.0×</text>

  <!-- Row 5: reader(2/50) -->
  <text x="40" y="444" fill="#e6edf3" font-size="12" font-weight="500">reader(2/50)</text>
  <text x="40" y="458" fill="#7d8590" font-size="10">lazy Row · 37 MB</text>

  <rect x="180" y="436" width="315" height="14" rx="3" fill="url(#grayBar)" opacity="0.7"/>
  <text x="502" y="448" fill="#7d8590" font-size="11">0.324s</text>

  <rect x="180" y="454" width="83" height="14" rx="3" fill="url(#greenBar)"/>
  <text x="270" y="466" fill="#2dd4a0" font-size="11" font-weight="600">0.086s</text>
  <rect x="552" y="441" width="44" height="24" rx="4" fill="#1D9E75" opacity="0.15"/>
  <text x="574" y="458" fill="#2dd4a0" font-size="12" font-weight="700" text-anchor="middle">3.8×</text>

  <!-- Row 6: writer() 10 cols -->
  <text x="40" y="498" fill="#e6edf3" font-size="12" font-weight="500">writer()</text>
  <text x="40" y="512" fill="#7d8590" font-size="10">10 cols · 6.7 MB</text>

  <rect x="180" y="490" width="195" height="14" rx="3" fill="url(#grayBar)" opacity="0.7"/>
  <text x="382" y="502" fill="#7d8590" font-size="11">0.160s</text>

  <rect x="180" y="508" width="137" height="14" rx="3" fill="#58a6ff" opacity="0.7"/>
  <text x="324" y="520" fill="#58a6ff" font-size="11" font-weight="600">0.112s</text>
  <rect x="430" y="495" width="44" height="24" rx="4" fill="#58a6ff" opacity="0.1"/>
  <text x="452" y="512" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">1.4×</text>

  <!-- Row 7: writer() 50 cols -->
  <text x="40" y="552" fill="#e6edf3" font-size="12" font-weight="500">writer()</text>
  <text x="40" y="566" fill="#7d8590" font-size="10">50 cols · 37 MB</text>

  <rect x="180" y="544" width="400" height="14" rx="3" fill="url(#grayBar)" opacity="0.7"/>
  <text x="587" y="556" fill="#7d8590" font-size="11">0.780s</text>

  <rect x="180" y="562" width="281" height="14" rx="3" fill="#58a6ff" opacity="0.7"/>
  <text x="468" y="574" fill="#58a6ff" font-size="11" font-weight="600">0.548s</text>
  <rect x="637" y="549" width="44" height="24" rx="4" fill="#58a6ff" opacity="0.1"/>
  <text x="659" y="566" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">1.4×</text>

  <!-- Footer -->
  <line x1="40" y1="595" x2="800" y2="595" stroke="#21262d" stroke-width="0.5"/>
  <text x="40" y="612" fill="#484f58" font-size="11">Rust core · PyO3 · zero-copy lazy Row · SharedBuffer architecture · CSV injection protection · RFC 4180 strict mode</text>
</svg>
